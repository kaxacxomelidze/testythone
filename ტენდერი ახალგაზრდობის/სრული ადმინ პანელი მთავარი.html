<!doctype html>
<html lang="ka">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>ადმინ პანელი (დემო) — ახალგაზრდობის სააგენტო</title>
  <style>
    :root{
      --bg:#0b1220; --panel:#0f172a; --card:#111c33; --line:#1e2a45;
      --txt:#e5e7eb; --muted:#94a3b8; --ac:#2563eb; --ok:#16a34a; --bad:#ef4444; --warn:#f59e0b;
      --radius:16px;
      font-synthesis-weight:none;
    }
    *{box-sizing:border-box}
    body{margin:0;background:linear-gradient(180deg,#0b1220,#0a1020);color:var(--txt);font:700 14px/1.5 system-ui, -apple-system, Segoe UI, Roboto, Arial;}
    a{color:inherit;text-decoration:none}
    .wrap{display:grid;grid-template-columns:280px 1fr;min-height:100vh}
    .side{background:rgba(15,23,42,.95);border-right:1px solid var(--line);padding:18px;position:sticky;top:0;height:100vh;overflow:auto}
    .brand{display:flex;gap:10px;align-items:center;margin-bottom:14px}
    .logo{width:42px;height:42px;border-radius:12px;background:radial-gradient(circle at 30% 30%, rgba(37,99,235,.9), rgba(37,99,235,.1));border:1px solid rgba(37,99,235,.35)}
    .brand h1{font-size:14px;margin:0}
    .brand .muted{font-size:12px;color:var(--muted);font-weight:800}
    .nav{margin-top:12px;display:flex;flex-direction:column;gap:6px}
    .nav a{padding:10px 12px;border-radius:12px;border:1px solid transparent;color:var(--muted);font-weight:900}
    .nav a.active{background:rgba(37,99,235,.12);border-color:rgba(37,99,235,.35);color:var(--txt)}
    .nav a:hover{border-color:rgba(148,163,184,.22);color:var(--txt)}
    .userbox{margin-top:14px;padding:12px;border:1px solid var(--line);border-radius:14px;background:rgba(17,28,51,.55)}
    .pill{display:inline-flex;align-items:center;gap:8px;padding:6px 10px;border-radius:999px;border:1px solid var(--line);font-weight:900}
    .pill.ok{border-color:rgba(22,163,74,.35);background:rgba(22,163,74,.10)}
    .pill.warn{border-color:rgba(245,158,11,.35);background:rgba(245,158,11,.10)}
    .pill.bad{border-color:rgba(239,68,68,.35);background:rgba(239,68,68,.10)}
    .main{padding:18px 18px 32px}
    .topbar{display:flex;gap:10px;align-items:center;justify-content:space-between;margin-bottom:14px}
    .topbar h2{margin:0;font-size:18px}
    .search{flex:1;max-width:520px;display:flex;gap:8px}
    input,select,textarea{width:100%;padding:10px 12px;border-radius:12px;border:1px solid var(--line);background:rgba(17,28,51,.55);color:var(--txt);outline:none;font-weight:800}
    textarea{min-height:110px;resize:vertical}
    .btn{padding:10px 12px;border-radius:12px;border:1px solid var(--line);background:rgba(17,28,51,.55);color:var(--txt);cursor:pointer;font-weight:1000}
    .btn.ac{background:rgba(37,99,235,.18);border-color:rgba(37,99,235,.4)}
    .btn.ok{background:rgba(22,163,74,.18);border-color:rgba(22,163,74,.4)}
    .btn.bad{background:rgba(239,68,68,.14);border-color:rgba(239,68,68,.4)}
    .btn:disabled{opacity:.55;cursor:not-allowed}
    .grid{display:grid;grid-template-columns:1fr;gap:12px}
    .cards{display:grid;grid-template-columns:repeat(12,1fr);gap:12px}
    .card{background:rgba(17,28,51,.55);border:1px solid var(--line);border-radius:var(--radius);padding:14px}
    .kpi{grid-column:span 4}
    .kpi .muted{color:var(--muted);font-weight:900}
    .kpi b{font-size:20px}
    .row{display:flex;gap:10px;align-items:center}
    .row.sp{justify-content:space-between}
    .muted{color:var(--muted);font-weight:900}
    table{width:100%;border-collapse:collapse}
    th,td{padding:10px;border-bottom:1px solid var(--line);vertical-align:top;text-align:left}
    th{color:var(--muted);font-weight:1000}
    .right{display:flex;gap:8px;justify-content:flex-end}
    .tag{font-weight:1000;font-size:12px;padding:4px 8px;border-radius:999px;border:1px solid var(--line);display:inline-flex}
    .tag.open{border-color:rgba(22,163,74,.35);background:rgba(22,163,74,.10)}
    .tag.closed{border-color:rgba(239,68,68,.35);background:rgba(239,68,68,.10)}
    .tag.draft{border-color:rgba(245,158,11,.35);background:rgba(245,158,11,.10)}
    .two{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .hint{font-size:12px;color:var(--muted);font-weight:900;margin-top:6px}
    .stars{display:flex;gap:4px}
    .star{cursor:pointer;font-size:18px;color:#64748b}
    .star.on{color:#fbbf24}
    .modal{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;padding:18px}
    .modal.open{display:flex}
    .modal .box{width:min(980px,100%);max-height:85vh;overflow:auto}
    @media (max-width: 920px){
      .wrap{grid-template-columns:1fr}
      .side{position:relative;height:auto}
      .kpi{grid-column:span 6}
      .two{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
<div id="app"></div>

/* =========================

========================= */
const K = {
  session: "ya_admin_session",

  camps: "ya_camps",
  campApps: "ya_camp_apps",
  grants: "ya_grants",
  grantApps: "ya_grant_apps",
  logs: "ya_logs",
};

/* =========================

========================= */

      sliderInterval: 15,

/* =========================
   App render
========================= */
render();

function render(){
  const session = getJSON(K.session);
  if(!session) return renderLogin();

  const route = (location.hash || "#/dashboard").replace("#/","");
  renderShell(route, session);
}

/* =========================
   Shell
========================= */
function renderShell(route, session){
  document.getElementById("app").innerHTML = `
    <div class="wrap">
      <aside class="side">
        <div class="brand">
          <div class="logo"></div>
          <div>
            <h1>ახალგაზრდობის სააგენტო</h1>
            <div class="muted">ადმინისტრირება</div>
          </div>
        </div>

        <div class="userbox">
          <div class="row sp">
            <div>
              <div style="font-weight:1000">${session.username}</div>
              <div class="muted">${session.role==="super" ? KA.roleSuper : KA.roleAdmin}</div>
            </div>
            <button class="btn" id="btnLogout">${KA.logout}</button>
          </div>
        </div>

        <nav class="nav" style="margin-top:12px">
          ${navLink("dashboard", KA.navDashboard, route)}
          ${navLink("home", KA.navHome, route)}
          ${navLink("news", KA.navNews, route)}
          ${navLink("camps", KA.navCamps, route)}
          ${navLink("camp-apps", KA.navCampApps, route)}
          ${navLink("grants", KA.navGrants, route)}
          ${navLink("grant-apps", KA.navGrantApps, route)}
          ${navLink("admins", KA.navAdmins, route)}
          ${navLink("logs", KA.navLogs, route)}
        </nav>
      </aside>

      <main class="main">
        <div class="topbar">
          <h2 id="pageTitle"></h2>
          <div class="search">
            <input id="q" placeholder="${KA.search}">
            <button class="btn" id="btnSearch">OK</button>
          </div>
        </div>

        <div id="page"></div>
      </main>
    </div>

    <div class="modal" id="modal">
      <div class="card box">
        <div class="row sp">
          <b id="mTitle">${KA.details}</b>
          <button class="btn" id="mClose">${KA.close}</button>
        </div>
        <div id="mBody" style="margin-top:10px"></div>
      </div>
    </div>
  `;

  document.getElementById("btnLogout").onclick = ()=>{
    logAction(session, "LOGOUT", "session", "");
    localStorage.removeItem(K.session);
    render();
  };

  document.getElementById("mClose").onclick = closeModal;
  document.getElementById("btnSearch").onclick = ()=> renderRoute(route, session, val("q"));

  window.onhashchange = ()=> {
    const r = (location.hash || "#/dashboard").replace("#/","");
    renderRoute(r, session, "");
  };

  renderRoute(route, session, "");
}

/* =========================
   Routes
========================= */
function renderRoute(route, session, q){
  const page = document.getElementById("page");
  const title = document.getElementById("pageTitle");
  const query = (q||"").trim().toLowerCase();

  if(route==="dashboard"){
    title.textContent = KA.navDashboard;
    const camps = getJSON(K.camps);
    const grants = getJSON(K.grants);
    const campApps = getJSON(K.campApps);
    const grantApps = getJSON(K.grantApps);

    const activeCamps = camps.filter(c=>!isCampAutoClosed(c) && !c.closed).length;
    const openGrants = grants.filter(g=>g.status==="open" && g.deadline >= today()).length;
    const newApps = campApps.filter(a=>a.createdAt.slice(0,10) >= addDays(-7)).length;
    const clar = grantApps.filter(a=>a.status==="clarify").length;

    page.innerHTML = `
      <div class="cards">
        <div class="card kpi"><div class="muted">${KA.kpiActiveCamps}</div><b>${activeCamps}</b></div>
        <div class="card kpi"><div class="muted">${KA.kpiOpenGrants}</div><b>${openGrants}</b></div>
        <div class="card kpi"><div class="muted">${KA.kpiNewApps}</div><b>${newApps}</b></div>
        <div class="card kpi"><div class="muted">${KA.kpiClarify}</div><b>${clar}</b></div>
      </div>

      <div class="card" style="margin-top:12px">
        <div class="row sp">
          <b>${KA.quickActions}</b>
          <div class="row">
            <button class="btn ac" id="qaCamp">${KA.addCamp}</button>
            <button class="btn ac" id="qaNews">${KA.addNews}</button>
            <button class="btn" id="qaExport">${KA.exportCSV}</button>
          </div>
        </div>
        <div class="hint">შენიშვნა: DEMO რეჟიმში CSV ექსპორტი გენერირდება ბრაუზერში.</div>
      </div>
    `;
    document.getElementById("qaCamp").onclick = ()=> { location.hash="#/camps"; openCampEditor(null, session); };
    document.getElementById("qaNews").onclick = ()=> { location.hash="#/news"; openNewsEditor(null, session); };
    document.getElementById("qaExport").onclick = ()=> exportCSV("camp_applications.csv", getJSON(K.campApps));

    return;
  }



  if(route==="camps"){
    title.textContent = KA.navCamps;
    let items = getJSON(K.camps);
    if(query) items = items.filter(c => (c.name+c.cardText).toLowerCase().includes(query));

    page.innerHTML = `
      <div class="card">
        <div class="row sp">
          <b>${KA.campsTitle}</b>
          <button class="btn ac" id="addCamp">${KA.add}</button>
        </div>
        <div style="overflow:auto;margin-top:10px">
          <table>
            <thead><tr>
              <th>${KA.campName}</th><th>${KA.status}</th><th>${KA.createdAt}</th><th>${KA.actions}</th>
            </tr></thead>
            <tbody>
              ${items.map(c=>{
                const autoClosed = isCampAutoClosed(c);
                const closed = c.closed || autoClosed;
                return `
                  <tr>
                    <td>
                      <b>${esc(c.name)}</b>
                      <div class="muted">${esc(c.cardText||"")}</div>
                      <div class="muted">${c.start} → ${c.end}</div>
                      <div class="hint">${KA.oneTimeRule}: ${KA.windowDays}=${c.windowDays || 0}</div>
                    </td>
                    <td>${closed ? `<span class="tag closed">${KA.closed}</span>` : `<span class="tag open">${KA.open}</span>`}</td>
                    <td class="muted">${c.start}</td>
                    <td class="right">
                      <button class="btn" data-edit="${c.id}">${KA.edit}</button>
                      <button class="btn" data-form="${c.id}">${KA.formBuilder}</button>
                      <button class="btn bad" data-del="${c.id}">${KA.del}</button>
                    </td>
                  </tr>
                `;
              }).join("")}
            </tbody>
          </table>
        </div>
      </div>
    `;

    page.querySelectorAll("[data-del]").forEach(b=>b.onclick=()=>{
      const all = getJSON(K.camps).filter(x=>x.id!==b.dataset.del);
      setJSON(K.camps, all);
      logAction(session,"DELETE","camps", b.dataset.del);
      renderRoute("camps", session, "");
    });
    return;
  }

  if(route==="camp-apps"){
    title.textContent = KA.navCampApps;
    let apps = getJSON(K.campApps);
    if(query) apps = apps.filter(a => (a.name+a.surname+a.pid+a.phone).toLowerCase().includes(query));
    const camps = getJSON(K.camps);

    page.innerHTML = `
      <div class="card">
        <div class="row sp">
          <b>${KA.appsTitle}</b>
          <div class="row">
            <button class="btn" id="export">${KA.exportCSV}</button>
          </div>
        </div>
        <div style="overflow:auto;margin-top:10px">
          <table>
            <thead><tr>
              <th>${KA.appId}</th><th>${KA.applicant}</th><th>${KA.status}</th><th>${KA.rating}</th><th>${KA.createdAt}</th><th>${KA.actions}</th>
            </tr></thead>
            <tbody>
              ${apps.map(a=>{
                const camp = camps.find(c=>c.id===a.campId);
                return `
                  <tr>
                    <td><b>${a.id}</b><div class="muted">${esc(camp?camp.name:"(უცნობი ბანაკი)")}</div></td>
                    <td>${esc(a.name)} ${esc(a.surname)}<div class="muted">${KA.pid}: ${esc(a.pid)} • ${KA.phone}: ${esc(a.phone)}</div></td>
                    <td>${statusTag(a.status)}</td>
                    <td>${renderStarsInline(a.rating||0)}</td>
                    <td class="muted">${a.createdAt.slice(0,16).replace("T"," ")}</td>
                    <td class="right">
                      <button class="btn" data-view="${a.id}">${KA.view}</button>
                    </td>
                  </tr>
                `;
              }).join("")}
            </tbody>
          </table>
        </div>
      </div>
    `;
    document.getElementById("export").onclick = ()=> exportCSV("camp_applications.csv", getJSON(K.campApps));
    page.querySelectorAll("[data-view]").forEach(b=>b.onclick=()=>openCampApp(b.dataset.view, session));
    return;
  }


  if(route==="logs"){
    title.textContent = KA.navLogs;
    let logs = getJSON(K.logs);
    logs = logs.slice().reverse();
    if(query) logs = logs.filter(l => (l.user+l.action+l.object+l.ip+l.time).toLowerCase().includes(query));

    page.innerHTML = `
      <div class="card">
        <div class="row sp"><b>${KA.logsTitle}</b><span class="pill warn">Audit</span></div>
        <div style="overflow:auto;margin-top:10px">
          <table>
            <thead><tr><th>${KA.who}</th><th>${KA.what}</th><th>${KA.object}</th><th>${KA.ip}</th><th>${KA.time}</th></tr></thead>
            <tbody>
              ${logs.map(l=>`
                <tr>
                  <td><b>${esc(l.user)}</b><div class="muted">${esc(l.role)}</div></td>
                  <td>${esc(l.action)}</td>
                  <td class="muted">${esc(l.object)}</td>
                  <td class="muted">${esc(l.ip)}</td>
                  <td class="muted">${esc(l.time.replace("T"," ").slice(0,19))}</td>
                </tr>
              `).join("")}
            </tbody>
          </table>
        </div>
      </div>
    `;
    return;
  }

  title.textContent = "404";
  page.innerHTML = `<div class="card">გვერდი ვერ მოიძებნა.</div>`;
}

function openFormBuilder(campId, session){
  const all = getJSON(K.camps);
  const c = all.find(x=>x.id===campId);
  const form = c.form || [];
  openModal(KA.formBuilder + " — " + esc(c.name), `
    <div class="card">
      <div class="hint">ველების დამატება/რედაქტირება/წაშლა და რიგითობის მართვა (DEMO — up/down).</div>
      <div style="overflow:auto;margin-top:10px">
        <table>
          <thead><tr><th>${KA.fieldLabel}</th><th>${KA.fieldType}</th><th>${KA.fieldReq}</th><th>${KA.fieldOptions}</th><th>${KA.actions}</th></tr></thead>
          <tbody>
            ${form.map((f,i)=>`
              <tr>
                <td><input data-k="label" data-i="${i}" value="${escAttr(f.label)}"></td>
                <td>
                  <select data-k="type" data-i="${i}">
                    ${opt("text","ტექსტი",f.type)}
                    ${opt("pid","პირადი ნომერი",f.type)}
                    ${opt("phone","ტელეფონი",f.type)}
                    ${opt("email","ელ.ფოსტა",f.type)}
                    ${opt("date","თარიღი",f.type)}
                    ${opt("select","ჩამოსაშლელი (select)",f.type)}
                    ${opt("file","ფაილი",f.type)}
                  </select>
                </td>
                <td style="text-align:center"><input data-k="req" data-i="${i}" type="checkbox" ${f.req?"checked":""}></td>
                <td><input data-k="options" data-i="${i}" value="${escAttr(f.options||"")}"></td>
                <td class="right">
                  <button class="btn" data-up="${i}">↑</button>
                  <button class="btn" data-down="${i}">↓</button>
                  <button class="btn bad" data-del="${f.id}">${KA.del}</button>
                </td>
              </tr>
            `).join("")}
          </tbody>
        </table>
      </div>

      <hr style="border:0;border-top:1px solid var(--line);margin:14px 0">

      <div class="two">
        <div><label class="muted">${KA.fieldLabel}</label><input id="nf_label"></div>
        <div>
          <label class="muted">${KA.fieldType}</label>
          <select id="nf_type">
            <option value="text">ტექსტი</option>
            <option value="pid">პირადი ნომერი</option>
            <option value="phone">ტელეფონი</option>
            <option value="email">ელ.ფოსტა</option>
            <option value="date">თარიღი</option>
            <option value="select">select</option>
            <option value="file">ფაილი</option>
          </select>
        </div>
      </div>
      <div class="two" style="margin-top:10px">
        <div class="row" style="margin-top:22px">
          <input style="width:20px" type="checkbox" id="nf_req">
          <label class="muted">${KA.fieldReq}</label>
        </div>
        <div>
          <label class="muted">${KA.fieldOptions}</label>
          <input id="nf_options" placeholder="მაგ: ვარიანტი 1, ვარიანტი 2">
        </div>
      </div>

      <div class="right" style="margin-top:12px">
        <button class="btn ac" id="addField">${KA.addField}</button>
        <button class="btn" id="saveForm">${KA.save}</button>
      </div>
    </div>
  `);

  // bind edits
  document.querySelectorAll("[data-k]").forEach(el=>{
    el.onchange = ()=>{
      const i = Number(el.dataset.i);
      const k = el.dataset.k;
      if(k==="req") form[i].req = el.checked;
      else form[i][k] = el.value;
    };
  });

  document.querySelectorAll("[data-del]").forEach(b=>b.onclick=()=>{
    const idd = b.dataset.del;
    c.form = (c.form||[]).filter(x=>x.id!==idd);
    setJSON(K.camps, all.map(x=>x.id===campId?c:x));
    logAction(session,"DELETE","camps.form", idd);
    closeModal(); renderRoute("camps", getJSON(K.session), "");
  });

  document.querySelectorAll("[data-up]").forEach(b=>b.onclick=()=>{
    const i=Number(b.dataset.up);
    if(i<=0) return;
    const tmp=form[i-1]; form[i-1]=form[i]; form[i]=tmp;
    c.form=form; setJSON(K.camps, all.map(x=>x.id===campId?c:x)); logAction(session,"UPDATE","camps.form","reorder");
    closeModal(); openFormBuilder(campId, session);
  });
  document.querySelectorAll("[data-down]").forEach(b=>b.onclick=()=>{
    const i=Number(b.dataset.down);
    if(i>=form.length-1) return;
    const tmp=form[i+1]; form[i+1]=form[i]; form[i]=tmp;
    c.form=form; setJSON(K.camps, all.map(x=>x.id===campId?c:x)); logAction(session,"UPDATE","camps.form","reorder");
    closeModal(); openFormBuilder(campId, session);
  });

  document.getElementById("addField").onclick=()=>{
    c.form = c.form || [];
    c.form.push({
      id:id(),
      label: val("nf_label"),
      type: val("nf_type"),
      req: document.getElementById("nf_req").checked,
      options: val("nf_options")
    });
    setJSON(K.camps, all.map(x=>x.id===campId?c:x));
    logAction(session,"CREATE","camps.form","field");
    closeModal(); openFormBuilder(campId, session);
  };

  document.getElementById("saveForm").onclick=()=>{
    c.form = form;
    setJSON(K.camps, all.map(x=>x.id===campId?c:x));
    logAction(session,"UPDATE","camps.form","save");
    toast("შენახულია");
    closeModal();
  };
}

    g.name=val("g_name"); g.deadline=val("g_dead"); g.short=val("g_short"); g.body=val("g_body"); g.cover=val("g_cover"); g.status=val("g_status");
    if(grantId){ setJSON(K.grants, all.map(x=>x.id===grantId?g:x)); logAction(session,"UPDATE","grants",grantId); }
    else { all.unshift(g); setJSON(K.grants, all); logAction(session,"CREATE","grants",g.id); }
    closeModal(); renderRoute("grants", getJSON(K.session), "");
  };
}

function openGrantApp(appId, session){
  const apps = getJSON(K.grantApps);
  const a = apps.find(x=>x.id===appId);
  openModal("საგრანტო განაცხადი — " + appId, `
    <div class="two">
      <div class="card">
        <b>${KA.details}</b>
        <div class="muted" style="margin-top:10px">${KA.applicant}: <b style="color:var(--txt)">${esc(a.applicant)}</b></div>
        <div class="muted">${KA.createdAt}: <b style="color:var(--txt)">${a.createdAt.slice(0,19).replace("T"," ")}</b></div>
      </div>
      <div class="card">
        <b>${KA.setStatus}</b>
        <select id="st" style="margin-top:10px">
          ${opt("received","მიღებულია",a.status)}
          ${opt("in_review","განხილვაშია",a.status)}
          ${opt("approved","დამტკიცებულია",a.status)}
          ${opt("rejected","უარყოფილია",a.status)}
          ${opt("clarify","საჭიროებს დაზუსტებას",a.status)}
        </select>

        <div style="margin-top:10px"><b>${KA.rating}</b></div>
        <div class="stars" id="stars">${starsUI(a.rating||0)}</div>

        <div style="margin-top:10px">
          <label class="muted">${KA.reviewerNote}</label>
          <textarea id="note">${esc(a.note||"")}</textarea>
        </div>

        <div class="right" style="margin-top:12px">
          <button class="btn ac" id="save">${KA.save}</button>
        </div>
      </div>
    </div>
  `);

  let current=a.rating||0;
  document.querySelectorAll("[data-star]").forEach(el=>{
    el.onclick=()=>{
      current=Number(el.dataset.star);
      document.getElementById("stars").innerHTML = starsUI(current);
      document.querySelectorAll("[data-star]").forEach(e2=>e2.onclick=el.onclick);
    };
  });

  document.getElementById("save").onclick=()=>{
    a.status=val("st"); a.rating=current; a.note=val("note");
    setJSON(K.grantApps, apps.map(x=>x.id===appId?a:x));
    logAction(session,"UPDATE","grant_applications", appId);
    toast("შენახულია");
    closeModal();
    renderRoute("grant-apps", getJSON(K.session), "");
  };
}

function openAdminEditor(userId, session){
  const all = getJSON(K.users);
  const u = userId ? all.find(x=>x.id===userId) : {id:id(), username:"", pass:"", role:"admin"};
  openModal("ადმინის " + (userId?KA.edit:KA.add), `
    <div class="two">
      <div><label class="muted">${KA.username}</label><input id="a_user" value="${escAttr(u.username)}"></div>

      <label class="muted">${KA.role}</label>

    </div>

    closeModal(); renderRoute("admins", getJSON(K.session), "");

/* =========================
   Helpers
========================= */
function navLink(path, label, current){
  const act = current===path ? "active" : "";
  return `<a class="${act}" href="#/${path}">${label}</a>`;
}
function openModal(title, body){
  document.getElementById("mTitle").textContent = title;
  document.getElementById("mBody").innerHTML = body;
  document.getElementById("modal").classList.add("open");
}
function closeModal(){ document.getElementById("modal").classList.remove("open"); }
function toast(msg){ alert(msg); } // demo
function val(id){ return (document.getElementById(id)?.value || "").trim(); }
function id(){ return Math.random().toString(16).slice(2)+Date.now().toString(16); }
function nowISO(){ return new Date().toISOString(); }
function today(){ return new Date().toISOString().slice(0,10); }
function addDays(n){
  const d=new Date(); d.setDate(d.getDate()+n);
  return d.toISOString().slice(0,10);
}
function setJSON(k,v){ localStorage.setItem(k, JSON.stringify(v)); }
function getJSON(k){ try{return JSON.parse(localStorage.getItem(k));}catch(e){return null;} }
function esc(s){ return (s??"").toString().replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;"); }
function escAttr(s){ return esc(s).replaceAll("\n"," "); }
function opt(value,label,cur){ return `<option value="${value}" ${value===cur?"selected":""}>${label}</option>`; }

function isCampAutoClosed(c){
  // ავტომატური დახურვა თარიღის მიხედვით
  return (c.end || "0000-00-00") < today();
}

function statusTag(st){
  const map = {
    received: ["მიღებულია","open"],
    in_review:["განხილვაშია","draft"],
    approved:["დამტკიცებულია","open"],
    rejected:["უარყოფილია","closed"],
    clarify:["საჭიროებს დაზუსტებას","draft"]
  };
  const m = map[st] || [st,"draft"];
  const cls = m[1]==="open"?"open":(m[1]==="closed"?"closed":"draft");
  return `<span class="tag ${cls}">${m[0]}</span>`;
}
function renderStarsInline(n){
  n = Number(n||0);
  let s="";
  for(let i=1;i<=5;i++){
    s += `<span class="star ${i<=n?"on":""}">★</span>`;
  }
  return `<div class="stars">${s}</div>`;
}
function starsUI(n){
  n=Number(n||0);
  let s="";
  for(let i=1;i<=5;i++){
    s += `<span class="star ${i<=n?"on":""}" data-star="${i}">★</span>`;
  }
  return s;
}

function exportCSV(filename, rows){
  const keys = Object.keys(rows[0]||{});
  const csv = [
    keys.join(","),
    ...rows.map(r=>keys.map(k=>JSON.stringify(r[k]??"")).join(","))
  ].join("\n");
  const blob = new Blob([csv], {type:"text/csv;charset=utf-8;"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}

/* =========================
   Logging (Audit)
========================= */
function logAction(user, action, object, objectId){
  const logs = getJSON(K.logs) || [];
  logs.push({
    user: user.username || user.id || "unknown",
    role: user.role || "",
    action,
    object: object + (objectId?(":"+objectId):""),
    ip: "DEMO-IP",
    time: new Date().toISOString()
  });
  setJSON(K.logs, logs);
}

   Boot
========================= */
window.addEventListener("hashchange", render);
